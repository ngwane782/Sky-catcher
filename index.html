<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Catcher Launcher</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Sky Catcher</h1>
      <p>Configure the game here, then open the game window.</p>
    </header>

    <main class="container">
      <section class="card">
        <h2>Game Setup</h2>

        <form id="setupForm">
          <div class="form-row">
            <label for="playerName">Player Name</label>
            <input
              type="text"
              id="playerName"
              name="playerName"
              maxlength="20"
              placeholder="Enter player name"
            />
          </div>

          <div class="form-row">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty" name="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <fieldset>
            <legend>Bat Colour</legend>

            <label class="option-line">
              <input type="radio" name="batColour" value="blue" checked />
              Blue
            </label>

            <label class="option-line">
              <input type="radio" name="batColour" value="green" />
              Green
            </label>

            <label class="option-line">
              <input type="radio" name="batColour" value="red" />
              Red
            </label>
          </fieldset>

          <fieldset>
            <legend>Game Options</legend>

            <label class="option-line">
              <input type="checkbox" id="doubleScore" />
              Double score mode
            </label>

            <label class="option-line">
              <input type="checkbox" id="showShadow" checked />
              Show bat shadow
            </label>

            <label class="option-line">
              <input type="checkbox" id="randomSizes" />
              Random falling object sizes
            </label>
          </fieldset>

          <div class="button-row">
            <button type="button" id="openGameBtn">Open Game Window</button>
            <button type="button" id="saveSettingsBtn">Save Settings</button>
            <button type="button" id="loadSettingsBtn">Load Settings</button>
            <button type="button" id="resetSettingsBtn">Reset Settings</button>
            <button
              type="button"
              onclick="window.location.href = 'instructions.html'"
            >
              Instructions
            </button>
          </div>
        </form>

        <div class="preview-box">
          <h3>Live Preview</h3>
          <p id="previewText">No settings selected yet.</p>
        </div>
      </section>
    </main>

    <footer class="page-footer">
      <p>Sky Catcher Launcher</p>
    </footer>

    <script src="launcher.js"></script>
  </body>
</html>
